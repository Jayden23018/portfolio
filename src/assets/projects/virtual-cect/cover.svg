<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-label="Placeholder diagram: slice misalignment between two CT scans">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#B0492B"/>
    </marker>
  </defs>
  <rect width="1200" height="750" fill="#F4F0E6"/>
  <rect x="20" y="20" width="1160" height="710" fill="none" stroke="#B0492B" stroke-width="2" stroke-dasharray="10 8" rx="4"/>
  <text x="600" y="80" text-anchor="middle" font-family="monospace" font-size="22" fill="#211E18" letter-spacing="0.5">Fig 1 — the slices didn't line up</text>
  <!-- left stack: NCCT -->
  <g stroke="#211E18" stroke-width="1.5" fill="none">
    <rect x="280" y="200" width="200" height="120" rx="3"/>
    <line x1="280" y1="230" x2="480" y2="230"/>
    <line x1="280" y1="260" x2="480" y2="260"/>
    <line x1="280" y1="290" x2="480" y2="290"/>
  </g>
  <text x="380" y="350" text-anchor="middle" font-family="monospace" font-size="15" fill="#6B6453">NCCT (non-contrast)</text>
  <!-- right stack: CECT, offset down -->
  <g stroke="#211E18" stroke-width="1.5" fill="none">
    <rect x="720" y="250" width="200" height="120" rx="3"/>
    <line x1="720" y1="280" x2="920" y2="280"/>
    <line x1="720" y1="310" x2="920" y2="310"/>
    <line x1="720" y1="340" x2="920" y2="340"/>
  </g>
  <text x="820" y="400" text-anchor="middle" font-family="monospace" font-size="15" fill="#6B6453">CECT (contrast)</text>
  <!-- offset indicator -->
  <line x1="500" y1="260" x2="700" y2="310" stroke="#B0492B" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="600" y1="200" x2="600" y2="470" stroke="#B0492B" stroke-width="1.5" marker-end="url(#arr2)" marker-start="url(#arr2)"/>
  <text x="612" y="345" font-family="monospace" font-size="15" fill="#B0492B">z-axis offset</text>
  <text x="612" y="365" font-family="monospace" font-size="15" fill="#B0492B">≈ 150–190 mm</text>
  <text x="600" y="530" text-anchor="middle" font-family="monospace" font-size="16" fill="#6B6453">two scans of the same patient started at different z positions</text>
  <text x="600" y="690" text-anchor="middle" font-family="monospace" font-size="18" fill="#B0492B">// TODO — replace with the real misalignment schematic</text>
</svg>
