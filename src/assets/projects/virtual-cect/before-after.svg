<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Placeholder diagram: paired scans before and after alignment">
  <rect width="1200" height="700" fill="#F4F0E6"/>
  <rect x="20" y="20" width="1160" height="660" fill="none" stroke="#B0492B" stroke-width="2" stroke-dasharray="10 8" rx="4"/>
  <text x="600" y="70" text-anchor="middle" font-family="monospace" font-size="22" fill="#211E18" letter-spacing="0.5">Fig 3 — paired slices, before vs after alignment</text>
  <!-- before -->
  <text x="300" y="130" text-anchor="middle" font-family="monospace" font-size="16" fill="#6B6453">before — wrong anatomy overlaid</text>
  <g fill="none" stroke="#211E18" stroke-width="1.5">
    <rect x="170" y="160" width="130" height="130" rx="3"/>
    <rect x="330" y="190" width="130" height="130" rx="3" stroke-dasharray="5 5"/>
  </g>
  <line x1="235" y1="225" x2="395" y2="255" stroke="#B0492B" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="300" y="330" text-anchor="middle" font-family="monospace" font-size="13" fill="#B0492B">structures don't match</text>
  <!-- after -->
  <text x="900" y="130" text-anchor="middle" font-family="monospace" font-size="16" fill="#6B6453">after — same slice, same anatomy</text>
  <g fill="none" stroke="#211E18" stroke-width="1.5">
    <rect x="770" y="175" width="130" height="130" rx="3"/>
    <rect x="930" y="175" width="130" height="130" rx="3" stroke-dasharray="5 5"/>
  </g>
  <line x1="835" y1="240" x2="995" y2="240" stroke="#B0492B" stroke-width="1.5"/>
  <text x="900" y="345" text-anchor="middle" font-family="monospace" font-size="13" fill="#B0492B">structures align</text>
  <!-- divider -->
  <line x1="600" y1="150" x2="600" y2="380" stroke="#DAD3C2" stroke-width="1.5"/>
  <text x="600" y="470" text-anchor="middle" font-family="monospace" font-size="16" fill="#6B6453">the model isn't "better" — its inputs finally stopped lying</text>
  <text x="600" y="640" text-anchor="middle" font-family="monospace" font-size="18" fill="#B0492B">// TODO — replace with a de-identified before/after pair</text>
</svg>
