<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-label="Placeholder diagram: serial matching dispatch flow">
  <defs>
    <marker id="arr4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B6453"/>
    </marker>
  </defs>
  <rect width="1200" height="750" fill="#F4F0E6"/>
  <rect x="20" y="20" width="1160" height="710" fill="none" stroke="#B0492B" stroke-width="2" stroke-dasharray="10 8" rx="4"/>
  <text x="600" y="80" text-anchor="middle" font-family="monospace" font-size="22" fill="#211E18" letter-spacing="0.5">Fig 1 — serial dispatch, not a broadcast</text>
  <!-- runners -->
  <g font-family="monospace" font-size="14" fill="#6B6453" text-anchor="middle">
    <circle cx="150" cy="230" r="26" fill="none" stroke="#211E18" stroke-width="1.5"/><text x="150" y="280">runner A</text>
    <circle cx="150" cy="350" r="26" fill="none" stroke="#211E18" stroke-width="1.5"/><text x="150" y="400">runner B</text>
    <circle cx="150" cy="470" r="26" fill="none" stroke="#211E18" stroke-width="1.5"/><text x="150" y="520">runner C</text>
  </g>
  <!-- matcher -->
  <rect x="430" y="300" width="240" height="120" rx="6" fill="#ECE7DA" stroke="#B0492B" stroke-width="2"/>
  <text x="550" y="350" text-anchor="middle" font-family="monospace" font-size="16" fill="#B0492B">matching engine</text>
  <text x="550" y="375" text-anchor="middle" font-family="monospace" font-size="13" fill="#6B6453">score → offer one guide</text>
  <text x="550" y="395" text-anchor="middle" font-family="monospace" font-size="13" fill="#6B6453">at a time, in order</text>
  <!-- guides -->
  <g font-family="monospace" font-size="14" fill="#6B6453" text-anchor="middle">
    <circle cx="950" cy="290" r="26" fill="none" stroke="#211E18" stroke-width="1.5"/><text x="950" y="340">guide 1</text>
    <circle cx="1050" cy="410" r="26" fill="none" stroke="#211E18" stroke-width="1.5"/><text x="1050" y="460">guide 2</text>
  </g>
  <g stroke="#6B6453" stroke-width="1.5" marker-end="url(#arr4)" fill="none">
    <path d="M178,235 C 300,235 320,330 428,340"/>
    <path d="M178,355 C 300,355 320,360 428,360"/>
    <path d="M178,475 C 300,475 320,385 428,380"/>
    <path d="M672,340 C 780,340 820,300 924,294"/>
    <path d="M672,380 C 780,380 880,400 1024,408"/>
  </g>
  <text x="600" y="600" text-anchor="middle" font-family="monospace" font-size="16" fill="#6B6453">no race: only one guide is ever committed per request</text>
  <text x="600" y="690" text-anchor="middle" font-family="monospace" font-size="18" fill="#B0492B">// TODO — replace with the real serial-dispatch flow diagram</text>
</svg>
