<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Placeholder diagram: emergency escalation flow">
  <defs>
    <marker id="arr6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B6453"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#F4F0E6"/>
  <rect x="20" y="20" width="1160" height="660" fill="none" stroke="#B0492B" stroke-width="2" stroke-dasharray="10 8" rx="4"/>
  <text x="600" y="70" text-anchor="middle" font-family="monospace" font-size="22" fill="#211E18" letter-spacing="0.5">Fig 3 — emergency escalation path</text>
  <g font-family="monospace" font-size="15" fill="#211E18" text-anchor="middle">
    <rect x="60"  y="300" width="210" height="90" rx="6" fill="none" stroke="#211E18" stroke-width="1.5"/><text x="165" y="340">normal match</text><text x="165" y="362" font-size="13" fill="#6B6453">find a guide</text>
    <rect x="360" y="300" width="210" height="90" rx="6" fill="none" stroke="#211E18" stroke-width="1.5"/><text x="465" y="340">no guide in N s</text><text x="465" y="362" font-size="13" fill="#6B6453">timeout</text>
    <rect x="660" y="300" width="210" height="90" rx="6" fill="#ECE7DA" stroke="#B0492B" stroke-width="2"/><text x="765" y="340">escalate to</text><text x="765" y="362" font-size="13" fill="#B0492B">emergency pool</text>
    <rect x="960" y="300" width="180" height="90" rx="6" fill="none" stroke="#B0492B" stroke-width="1.5"/><text x="1050" y="340">30 s SLA</text><text x="1050" y="362" font-size="13" fill="#6B6453">hard deadline</text>
  </g>
  <g stroke="#6B6453" stroke-width="1.5" marker-end="url(#arr6)">
    <line x1="272" y1="345" x2="356" y2="345"/>
    <line x1="572" y1="345" x2="656" y2="345"/>
    <line x1="872" y1="345" x2="956" y2="345"/>
  </g>
  <text x="465" y="440" text-anchor="middle" font-family="monospace" font-size="13" fill="#6B6453">bounded pool never blocks the main path</text>
  <text x="765" y="440" text-anchor="middle" font-family="monospace" font-size="13" fill="#6B6453">caller-runs backpressure</text>
  <text x="600" y="600" text-anchor="middle" font-family="monospace" font-size="16" fill="#6B6453">a blind runner who falls must reach a human, fast</text>
  <text x="600" y="640" text-anchor="middle" font-family="monospace" font-size="18" fill="#B0492B">// TODO — replace with the real escalation flow diagram</text>
</svg>
